name: Build Flutter App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 1. Setup Java (Required for Android Gradle Plugin)
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. Setup Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Keeps you on the latest stable release
          cache: true       # Speeds up subsequent builds

      # 3. Create google-services.json (CRITICAL for Firebase)
      # You must add the BASE64 encoded content of your file to GitHub Secrets
      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      # 4. Build APK (Note: This produces an unsigned release APK or debug-signed)
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
