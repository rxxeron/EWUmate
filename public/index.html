
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWU Mate Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .admin-card {
            max-width: 700px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: #00d9ff;
            box-shadow: 0 0 0 0.2rem rgba(0, 217, 255, 0.25);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .nav-tabs {
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-tabs .nav-link {
            color: rgba(255, 255, 255, 0.7);
            border: none;
        }

        .nav-tabs .nav-link.active {
            background: transparent;
            color: #00d9ff;
            border-bottom: 2px solid #00d9ff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #00b4d8);
            border: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #00c853, #00e676);
            border: none;
        }

        .text-cyan {
            color: #00d9ff;
        }

        h3,
        h4,
        .form-label {
            color: #fff;
        }

        .alert-info {
            background: rgba(0, 217, 255, 0.1);
            border-color: #00d9ff;
            color: #00d9ff;
        }

        .bg-light-custom {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <!-- LOGIN SCREEN (Shown First) -->
    <div id="loginSection" class="container">
        <div class="login-card p-4 mx-auto">
            <div class="text-center mb-4">
                <h3 class="text-cyan">🔐 Admin Access</h3>
                <p class="text-white-50">Enter your secret key to continue</p>
            </div>

            <div id="loginError" class="alert alert-danger d-none"></div>

            <div class="mb-3">
                <input type="password" id="loginKey" class="form-control form-control-lg"
                    placeholder="Enter Admin Secret Key" autofocus>
            </div>

            <button id="loginBtn" onclick="verifyKey()" class="btn btn-primary w-100 py-2">
                🔓 Unlock Admin Panel
            </button>

            <p class="text-white-50 text-center mt-3 small">
                Key is stored in Firestore: <code>config/admin.secret_key</code>
            </p>
        </div>
    </div>

    <!-- ADMIN PANEL (Hidden Until Key Verified) -->
    <div id="adminSection" class="container d-none">
        <div class="admin-card p-4 mx-auto">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="text-cyan mb-0">📢 EWU Mate Admin</h3>
                <button onclick="logout()" class="btn btn-outline-danger btn-sm">Logout</button>
            </div>

            <div id="alertBox" class="alert d-none"></div>

            <ul class="nav nav-tabs mb-3" id="adminTabs">
                <li class="nav-item">
                    <a class="nav-link active" id="tab-broadcast" onclick="switchTab('broadcast')">📢 Broadcast</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="tab-files" onclick="switchTab('files')">📂 File Upload</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="tab-manual-triggers" onclick="switchTab('manual-triggers')">⚙️ Manual Triggers</a>
                </li>
            </ul>

            <!-- Broadcast Form -->
            <div id="section-broadcast">
                <form id="broadcastForm">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" id="title" class="form-control" placeholder="Notification Title" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Body</label>
                        <textarea id="body" class="form-control" rows="3" placeholder="Notification Body..."
                            required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Link (Optional)</label>
                        <input type="url" id="link" class="form-control" placeholder="https://...">
                    </div>

                    <div class="mb-3 p-3 bg-light-custom rounded">
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" id="scheduleToggle">
                            <label class="form-check-label text-white" for="scheduleToggle">Schedule for Later</label>
                        </div>
                        <div id="scheduleInputs" class="d-none">
                            <input type="datetime-local" id="scheduleTime" class="form-control">
                            <div class="form-text text-white-50">Leave unchecked to send immediately.</div>
                        </div>
                    </div>

                    <button type="submit" id="sendBtn" class="btn btn-primary w-100 py-2">
                        🚀 Send Broadcast
                    </button>
                </form>
            </div>

            <!-- File Upload Form -->
            <div id="section-files" class="d-none">
                <form id="uploadForm">
                    <div class="mb-3">
                        <label class="form-label">Target Folder</label>
                        <select id="folderSelect" class="form-select" required>
                            <option value="facultylist">Faculty List (facultylist/)</option>
                            <option value="academiccalendar">Academic Calendar (academiccalendar/)</option>
                            <option value="examschedule">Exam Schedule (examschedule/)</option>
                            <option value="advisingschedule">Advising Schedule (advisingschedule/)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Select PDF</label>
                        <input type="file" id="fileInput" class="form-control" accept="application/pdf" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Filename (on Server)</label>
                        <input type="text" id="filenameInput" class="form-control" placeholder="e.g. Spring2026.pdf"
                            required>
                    </div>

                    <div class="alert alert-info py-2">
                        <small>Upload triggers automatic parsing. E.g. <b>Spring2026.pdf</b></small>
                    </div>

                    <button type="submit" id="uploadBtn" class="btn btn-success w-100 py-2">
                        ⬆️ Upload File
                    </button>
                </form>
            </div>

            <!-- Manual Triggers Section -->
            <div id="section-manual-triggers" class="d-none">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <button onclick="triggerFunction('recalculate_all_stats')" class="btn btn-secondary w-100">Recalculate All Stats</button>
                    </div>
                    <div class="col-md-6 mb-3">
                        <button onclick="triggerFunction('backfill_all_schedules')" class="btn btn-secondary w-100">Backfill All Schedules</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="admin.js"></script>
</body>

</html>
