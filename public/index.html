<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWU Mate Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .admin-card {
            max-width: 700px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: #00d9ff;
            box-shadow: 0 0 0 0.2rem rgba(0, 217, 255, 0.25);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .nav-tabs {
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-tabs .nav-link {
            color: rgba(255, 255, 255, 0.7);
            border: none;
        }

        .nav-tabs .nav-link.active {
            background: transparent;
            color: #00d9ff;
            border-bottom: 2px solid #00d9ff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #00b4d8);
            border: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #00c853, #00e676);
            border: none;
        }

        .text-cyan {
            color: #00d9ff;
        }

        h3,
        h4,
        .form-label {
            color: #fff;
        }

        .alert-info {
            background: rgba(0, 217, 255, 0.1);
            border-color: #00d9ff;
            color: #00d9ff;
        }

        .bg-light-custom {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <!-- LOGIN SCREEN (Shown First) -->
    <div id="loginSection" class="container">
        <div class="login-card p-4 mx-auto">
            <div class="text-center mb-4">
                <h3 class="text-cyan">🔐 Admin Access</h3>
                <p class="text-white-50">Enter your secret key to continue</p>
            </div>

            <div id="loginError" class="alert alert-danger d-none"></div>

            <div class="mb-3">
                <input type="password" id="loginKey" class="form-control form-control-lg"
                    placeholder="Enter Admin Secret Key" autofocus>
            </div>

            <button id="loginBtn" onclick="verifyKey()" class="btn btn-primary w-100 py-2">
                🔓 Unlock Admin Panel
            </button>

            <p class="text-white-50 text-center mt-3 small">
                Key is stored in Firestore: <code>config/admin.secret_key</code>
            </p>
        </div>
    </div>

    <!-- ADMIN PANEL (Hidden Until Key Verified) -->
    <div id="adminSection" class="container d-none">
        <div class="admin-card p-4 mx-auto">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="text-cyan mb-0">📢 EWU Mate Admin</h3>
                <button onclick="logout()" class="btn btn-outline-danger btn-sm">Logout</button>
            </div>

            <div id="alertBox" class="alert d-none"></div>

            <ul class="nav nav-tabs mb-3" id="adminTabs">
                <li class="nav-item">
                    <a class="nav-link active" id="tab-broadcast" onclick="switchTab('broadcast')">📢 Broadcast</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="tab-files" onclick="switchTab('files')">📂 File Upload</a>
                </li>
            </ul>

            <!-- Broadcast Form -->
            <div id="section-broadcast">
                <form id="broadcastForm">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" id="title" class="form-control" placeholder="Notification Title" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Body</label>
                        <textarea id="body" class="form-control" rows="3" placeholder="Notification Body..."
                            required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Link (Optional)</label>
                        <input type="url" id="link" class="form-control" placeholder="https://...">
                    </div>

                    <div class="mb-3 p-3 bg-light-custom rounded">
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" id="scheduleToggle">
                            <label class="form-check-label text-white" for="scheduleToggle">Schedule for Later</label>
                        </div>
                        <div id="scheduleInputs" class="d-none">
                            <input type="datetime-local" id="scheduleTime" class="form-control">
                            <div class="form-text text-white-50">Leave unchecked to send immediately.</div>
                        </div>
                    </div>

                    <button type="submit" id="sendBtn" class="btn btn-primary w-100 py-2">
                        🚀 Send Broadcast
                    </button>
                </form>
            </div>

            <!-- File Upload Form -->
            <div id="section-files" class="d-none">
                <form id="uploadForm">
                    <div class="mb-3">
                        <label class="form-label">Target Folder</label>
                        <select id="folderSelect" class="form-select" required>
                            <option value="facultylist">Faculty List (facultylist/)</option>
                            <option value="academiccalendar">Academic Calendar (academiccalendar/)</option>
                            <option value="examschedule">Exam Schedule (examschedule/)</option>
                            <option value="advisingschedule">Advising Schedule (advisingschedule/)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Select PDF</label>
                        <input type="file" id="fileInput" class="form-control" accept="application/pdf" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Filename (on Server)</label>
                        <input type="text" id="filenameInput" class="form-control" placeholder="e.g. Spring2026.pdf"
                            required>
                    </div>

                    <div class="alert alert-info py-2">
                        <small>Upload triggers automatic parsing. E.g. <b>Spring2026.pdf</b></small>
                    </div>

                    <button type="submit" id="uploadBtn" class="btn btn-success w-100 py-2">
                        ⬆️ Upload File
                    </button>
                </form>
            </div>

        </div>
    </div>

    <script>
        const PROJECT_ID = "ewu-stu-togo";
        const REGION = "us-central1";
        const BASE_URL = `https://${REGION}-${PROJECT_ID}.cloudfunctions.net`;
        const BROADCAST_URL = `${BASE_URL}/send_broadcast_notification`;
        const UPLOAD_URL = `${BASE_URL}/upload_file_via_admin`;

        // NO HARDCODED KEY - stored server-side in Firestore only
        let currentKey = "";
        const alertBox = document.getElementById('alertBox');

        // === KEY VERIFICATION ===
        // Key is verified server-side when making requests
        // We just store it locally in session memory for API calls
        async function verifyKey() {
            const inputKey = document.getElementById('loginKey').value.trim();
            const errorDiv = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            if (!inputKey) {
                errorDiv.textContent = "❌ Please enter a key";
                errorDiv.classList.remove('d-none');
                return;
            }

            btn.disabled = true;
            btn.innerText = "Verifying...";

            // Test the key by making a simple request to the broadcast function
            // If key is wrong, server will reject with UNAUTHENTICATED
            try {
                const res = await fetch(BROADCAST_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        data: {
                            secret: inputKey,
                            title: "__verify__",
                            body: "__verify__"
                        }
                    })
                });

                const json = await res.json();

                // If we get UNAUTHENTICATED error, key is wrong
                if (json.error && json.error.message &&
                    (json.error.message.includes("Invalid") || json.error.message.includes("UNAUTHENTICATED"))) {
                    errorDiv.textContent = "❌ Invalid Admin Key";
                    errorDiv.classList.remove('d-none');
                    document.getElementById('loginKey').value = '';
                } else {
                    // Key is valid (or request succeeded)
                    currentKey = inputKey;
                    document.getElementById('loginSection').classList.add('d-none');
                    document.getElementById('adminSection').classList.remove('d-none');
                    errorDiv.classList.add('d-none');
                }
            } catch (err) {
                // Network error or other issue, but we passed auth check
                // Actually let's accept if no auth error
                currentKey = inputKey;
                document.getElementById('loginSection').classList.add('d-none');
                document.getElementById('adminSection').classList.remove('d-none');
                errorDiv.classList.add('d-none');
            } finally {
                btn.disabled = false;
                btn.innerText = "🔓 Unlock Admin Panel";
            }
        }

        // Enter key to submit
        document.getElementById('loginKey').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyKey();
        });

        function logout() {
            currentKey = "";
            document.getElementById('adminSection').classList.add('d-none');
            document.getElementById('loginSection').classList.remove('d-none');
            document.getElementById('loginKey').value = '';
        }

        // === TABS ===
        function switchTab(tab) {
            document.getElementById('section-broadcast').classList.toggle('d-none', tab !== 'broadcast');
            document.getElementById('section-files').classList.toggle('d-none', tab !== 'files');

            document.getElementById('tab-broadcast').classList.toggle('active', tab === 'broadcast');
            document.getElementById('tab-files').classList.toggle('active', tab === 'files');

            alertBox.classList.add('d-none');
        }

        // === BROADCAST LOGIC ===
        const toggle = document.getElementById('scheduleToggle');
        toggle.addEventListener('change', () => {
            document.getElementById('scheduleInputs').classList.toggle('d-none', !toggle.checked);
            if (!toggle.checked) document.getElementById('scheduleTime').value = '';
        });

        document.getElementById('broadcastForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            setLoading(true, "Sending...");

            const data = {
                title: document.getElementById('title').value,
                body: document.getElementById('body').value,
                link: document.getElementById('link').value,
                secret: currentKey  // Use verified key
            };

            const scheduledTime = document.getElementById('scheduleTime').value;
            if (toggle.checked && scheduledTime) {
                data.scheduledAt = new Date(scheduledTime).toISOString();
            }

            try {
                await postData(BROADCAST_URL, data);
                showAlert("success", "✅ Broadcast Sent!");
                document.getElementById('broadcastForm').reset();
            } catch (err) {
                if (err.message.includes("Invalid") || err.message.includes("UNAUTHENTICATED")) {
                    logout();
                    document.getElementById('loginError').textContent = "Session expired. Please login again.";
                    document.getElementById('loginError').classList.remove('d-none');
                } else {
                    showAlert("danger", "❌ Error: " + err.message);
                }
            } finally {
                setLoading(false, "🚀 Send Broadcast", "sendBtn");
            }
        });

        // === FILE UPLOAD LOGIC ===
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) document.getElementById('filenameInput').value = file.name;
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            setLoading(true, "Uploading... (This may take a minute)", "uploadBtn");

            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Content = reader.result.split(',')[1];

                const data = {
                    secret: currentKey,  // Use verified key
                    folder: document.getElementById('folderSelect').value,
                    filename: document.getElementById('filenameInput').value,
                    file_base64: base64Content
                };

                try {
                    const res = await postData(UPLOAD_URL, data);
                    showAlert("success", `✅ Uploaded to ${res.path}. Processing started.`);
                    document.getElementById('uploadForm').reset();
                } catch (err) {
                    if (err.message.includes("Invalid") || err.message.includes("UNAUTHENTICATED")) {
                        logout();
                        document.getElementById('loginError').textContent = "Session expired. Please login again.";
                        document.getElementById('loginError').classList.remove('d-none');
                    } else {
                        showAlert("danger", "❌ Upload Error: " + err.message);
                    }
                } finally {
                    setLoading(false, "⬆️ Upload File", "uploadBtn");
                }
            };
        });

        // === HELPERS ===
        async function postData(url, data) {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: data })
            });
            const json = await res.json();
            if (!res.ok || json.error) throw new Error(json.error?.message || "Request Failed");
            return json.result || json;
        }

        function setLoading(isLoading, text, btnId = "sendBtn") {
            const btn = document.getElementById(btnId);
            btn.disabled = isLoading;
            btn.innerText = text;
        }

        function showAlert(type, msg) {
            alertBox.className = `alert alert-${type}`;
            alertBox.innerText = msg;
            alertBox.classList.remove('d-none');
        }
    </script>
</body>

</html>
