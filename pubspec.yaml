name: mobile_app
description: A new Flutter project for the Mobile App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  firebase_messaging: ^16.1.1
  
  # Navigation & State
  go_router: ^17.0.1
  provider: ^6.1.1
  
  # UI & Utilities
  google_fonts: ^8.0.0
  intl: ^0.20.2
  cupertino_icons: ^1.0.2
  image_picker: ^1.2.1
  lottie: ^3.3.2

  timezone: ^0.10.1
  path: ^1.9.1

  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4
  cloud_functions: ^6.0.6
  url_launcher: ^6.2.4
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "#0F3460" # Matching App Theme
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
