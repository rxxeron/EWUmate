name: ewumate
description: The ultimate companion app for East West University students.
publish_to: 'none'
version: 1.0.3+14

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Core & Architecture ---
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  provider: ^6.1.2 
  go_router: ^17.1.0
  flutter_dotenv: ^6.0.0 
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  path: ^1.9.0

  # --- Permissions ---
  permission_handler: ^12.0.1 

  # --- UI & Design ---
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  glass_kit: ^4.0.2
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  gap: ^3.0.0
  flutter_native_splash: ^2.3.10

  # --- Media & Files ---
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  photo_view: ^0.15.0 

  # --- Utilities ---
  http: ^1.2.0
  url_launcher: ^6.2.5
  path_provider: ^2.1.2
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  flutter_local_notifications: ^20.1.0
  table_calendar: ^3.0.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.0

  # --- Annotations ---
  json_annotation: ^4.8.1
  freezed_annotation: ^3.1.0
  supabase_flutter: ^2.3.0
  syncfusion_flutter_pdf: ^24.0.0
  uuid: ^4.5.2
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Gen
  build_runner: ^2.4.8
  freezed: ^3.2.3
  json_serializable: ^6.7.1
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/lottie/


