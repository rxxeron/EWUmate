name: mobile_app
description: A new Flutter project for the Mobile App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.31.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.7.0
  firebase_messaging: ^14.7.9
  
  # Navigation & State
  go_router: ^13.0.0
  provider: ^6.1.1
  
  # UI & Utilities
  google_fonts: ^6.1.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.2
  image_picker: ^1.2.1
  lottie: ^3.3.2

  timezone: ^0.10.1
  path: ^1.9.1

  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4
  cloud_functions: ^4.7.6
  url_launcher: ^6.2.4
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "#0F3460" # Matching App Theme
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
