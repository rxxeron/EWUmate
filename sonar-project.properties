sonar.projectKey=rxxeron_ewumate
sonar.organization=rxxeron

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=EWUmate
sonar.projectVersion=1.0.0

# Path is relative to the sonar-project.properties file.
sonar.sources=lib

# Exclude generated Dart files and build directories from analysis
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.mocks.dart,**/.symlinks/**,**/build/**,**/generated_plugin_registrant.dart

# Exclude the "Target of URI doesn't exist" rule because the Docker scanner lacks the Flutter SDK.
# This rule is purely a build-environment check and doesn't represent actual code quality issues.
sonar.issue.ignore.multicriteria=p1
sonar.issue.ignore.multicriteria.p1.ruleKey=dart:S2260
sonar.issue.ignore.multicriteria.p1.resourceKey=**/*.dart

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8
